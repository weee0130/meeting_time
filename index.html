<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync - 會議時間調查系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-select { user-select: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .calendar-grid { display: grid; grid-template-columns: 64px repeat(7, 1fr); }
        /* 優化選取中格子的過渡效果 */
        .slot-active { background-color: #3b82f6 !important; }
        .slot-hover:hover { background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-20">

    <!-- Tooltip 氣泡 -->
    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900 text-white px-3 py-2 rounded-xl text-xs shadow-2xl border border-slate-700 hidden">
        <p class="font-bold border-b border-slate-700 pb-1 mb-1.5 flex items-center gap-1.5 text-green-400">
            <i data-lucide="users" class="w-3 h-3"></i> 有空的人：
        </p>
        <div id="tooltip-names" class="flex flex-wrap gap-1 max-w-[180px]"></div>
    </div>

    <!-- 導航欄 -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600 flex items-center gap-2">
                <i data-lucide="calendar" class="w-6 h-6"></i> MeetingSync
            </h1>
            <div id="nav-user-info" class="hidden items-center gap-4">
                <span id="display-user-name" class="text-sm font-bold text-slate-800"></span>
                <button onclick="handleSave()" id="save-btn" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 shadow-lg active:scale-95 transition-all">
                    儲存時間
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 mt-10">
        <!-- 管理員界面 -->
        <div id="view-admin" class="max-w-lg mx-auto bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200 hidden">
            <div class="mb-8 text-center">
                <div class="bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <i data-lucide="plus-circle" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-black">發起會議</h2>
            </div>
            <div class="space-y-5">
                <input id="new-title" type="text" placeholder="例如：專案週會" class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none shadow-sm">
                <button onclick="handleCreateMeeting()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-slate-800 shadow-xl active:scale-95 transition-all">
                    生成調查連結
                </button>
                <div id="link-result" class="mt-8 p-6 bg-green-50 rounded-2xl border border-green-100 hidden">
                    <div class="flex items-center gap-2 bg-white p-3 rounded-xl border border-green-200">
                        <code id="generated-url" class="flex-1 text-xs truncate text-slate-600"></code>
                        <button onclick="copyLink()" class="p-2.5 text-green-600 hover:bg-green-50 rounded-lg">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 身份驗證界面 -->
        <div id="view-auth" class="max-w-md mx-auto bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200 hidden">
            <div class="text-center mb-10">
                <div class="bg-indigo-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-indigo-600">
                    <i data-lucide="log-in" class="w-8 h-8"></i>
                </div>
                <h2 id="auth-meeting-title" class="text-2xl font-black">載入中...</h2>
                <p class="text-slate-500 text-sm mt-2">輸入姓名與密碼開始填寫</p>
            </div>
            <div class="space-y-5">
                <input id="login-name" type="text" placeholder="姓名" class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none shadow-sm">
                <input id="login-password" type="password" placeholder="密碼" class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none shadow-sm">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold hover:bg-blue-700 shadow-xl active:scale-95 transition-all">
                    進入填寫頁面
                </button>
            </div>
        </div>

        <!-- 調查主界面 -->
        <div id="view-survey" class="space-y-10 hidden animate-in fade-in duration-700">
            <div class="text-center">
                <h2 id="survey-title" class="text-4xl font-black">會議主題</h2>
                <p class="text-slate-500 mt-4 italic">左側框選您的時間，右側滑鼠懸停查看「誰有空」</p>
            </div>
            <div class="grid xl:grid-cols-2 gap-10">
                <!-- 個人填寫 -->
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">
                    <div class="p-5 bg-blue-600 text-white flex justify-between items-center">
                        <h3 class="font-bold flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> 您的時間</h3>
                        <span class="text-[10px] bg-white/20 px-2 py-1 rounded">滑鼠框選</span>
                    </div>
                    <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                </div>
                <!-- 團隊統計 -->
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">
                    <div class="p-5 bg-slate-800 text-white flex justify-between items-center">
                        <h3 class="font-bold flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> 團隊統計 <span id="participant-count" class="ml-1 text-slate-400"></span></h3>
                        <span class="text-[10px] bg-slate-700 px-2 py-1 rounded">懸停看姓名</span>
                    </div>
                    <div id="team-calendar" class="calendar-grid no-select"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '',
            password: '',
            mySlots: {},
            groupData: {},
            totalParticipants: 0,
            isDragging: false,
            dragMode: true
        };

        const hours = Array.from({ length: 16 }, (_, i) => i + 6);
        const daysShort = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
        
        const getWeekDates = () => {
            const now = new Date();
            const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay()));
            return Array.from({ length: 7 }, (_, i) => {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                return d.toISOString().split('T')[0];
            });
        };
        const weekDates = getWeekDates();

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                document.getElementById('auth-meeting-title').innerText = res?.title || '未知會議';
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await response.json();
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value;
            if (!title) return alert("請輸入主題");
            const res = await callAPI({ action: 'createMeeting', title });
            if (res?.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                document.getElementById('link-result').classList.remove('hidden');
            }
        }

        async function handleLogin() {
            state.userName = document.getElementById('login-name').value;
            state.password = document.getElementById('login-password').value;
            if (!state.userName || !state.password) return alert("請填寫姓名與密碼");

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res?.responses) {
                const myRecord = res.responses.find(r => r.name === state.userName);
                if (myRecord) {
                    if (myRecord.password !== state.password) return alert("姓名已被登記，密碼錯誤");
                    state.mySlots = JSON.parse(myRecord.slots);
                }
                processGroupData(res.responses);
                renderCalendars();
                document.getElementById('survey-title').innerText = document.getElementById('auth-meeting-title').innerText;
                document.getElementById('display-user-name').innerText = state.userName;
                document.getElementById('nav-user-info').classList.remove('hidden');
                showView('view-survey');
            }
        }

        function processGroupData(responses) {
            state.groupData = {};
            state.totalParticipants = responses.length;
            responses.forEach(r => {
                try {
                    const slots = JSON.parse(r.slots);
                    Object.keys(slots).forEach(s => {
                        if (slots[s]) {
                            if (!state.groupData[s]) state.groupData[s] = [];
                            state.groupData[s].push(r.name);
                        }
                    });
                } catch(e) {}
            });
            document.getElementById('participant-count').innerText = `(共 ${state.totalParticipants} 人)`;
        }

        async function handleSave() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "儲存中...";
            const res = await callAPI({
                action: 'saveResponse',
                meetingId,
                name: state.userName,
                password: state.password,
                slots: JSON.stringify(state.mySlots)
            });
            if (res && !res.error) {
                alert("儲存成功");
                const fresh = await callAPI({ action: 'getAllResponses', meetingId });
                processGroupData(fresh.responses);
                renderCalendars();
            }
            btn.disabled = false;
            btn.innerText = originalText;
        }

        // 修改選取邏輯：不重繪整個日曆，只切換類別
        function toggleSlot(key, el) {
            state.mySlots[key] = state.dragMode;
            if (state.dragMode) {
                el.classList.add('slot-active');
            } else {
                el.classList.remove('slot-active');
            }
        }

        function renderCalendars() {
            const myContainer = document.getElementById('my-calendar');
            const teamContainer = document.getElementById('team-calendar');
            myContainer.innerHTML = '';
            teamContainer.innerHTML = '';

            [myContainer, teamContainer].forEach(c => {
                c.innerHTML += '<div class="w-16 border-r border-slate-200 bg-slate-50"></div>';
                weekDates.forEach((date, i) => {
                    c.innerHTML += `
                        <div class="text-center py-2 border-r border-slate-200 bg-slate-50">
                            <div class="text-[10px] text-slate-500 uppercase">${daysShort[i]}</div>
                            <div class="text-xs font-bold">${date.split('-').slice(1).join('/')}</div>
                        </div>`;
                });
            });

            hours.forEach(hour => {
                [myContainer, teamContainer].forEach(c => {
                    const isMy = c.id === 'my-calendar';
                    const timeLabel = document.createElement('div');
                    timeLabel.className = "w-16 h-10 text-[10px] text-slate-400 flex items-center justify-center border-r border-slate-200 bg-slate-50 font-mono border-b border-slate-100";
                    timeLabel.innerText = `${String(hour).padStart(2, '0')}:00`;
                    c.appendChild(timeLabel);
                    
                    weekDates.forEach(date => {
                        const key = `${date}-${hour}`;
                        const el = document.createElement('div');
                        if (isMy) {
                            const active = state.mySlots[key];
                            el.className = `border-r border-b border-slate-100 cursor-pointer transition-colors slot-hover ${active ? 'slot-active' : ''}`;
                            el.dataset.key = key;
                            
                            el.onmousedown = (e) => {
                                e.preventDefault();
                                state.dragMode = !state.mySlots[key];
                                state.isDragging = true;
                                toggleSlot(key, el);
                            };
                            el.onmouseenter = () => {
                                if (state.isDragging) {
                                    toggleSlot(key, el);
                                }
                            };
                            c.appendChild(el);
                        } else {
                            const names = state.groupData[key] || [];
                            const count = names.length;
                            const intensity = state.totalParticipants > 0 ? (count / state.totalParticipants) : 0;
                            el.className = `border-r border-b border-slate-100 flex items-center justify-center text-[10px] text-white font-bold`;
                            if (count > 0) {
                                el.style.backgroundColor = `rgba(34, 197, 94, ${0.2 + intensity * 0.8})`;
                                el.innerText = count;
                                el.onmouseenter = (e) => showTooltip(e, names);
                                el.onmouseleave = hideTooltip;
                            }
                            c.appendChild(el);
                        }
                    });
                });
            });
        }

        function showTooltip(e, names) {
            const tt = document.getElementById('tooltip');
            const nameContainer = document.getElementById('tooltip-names');
            nameContainer.innerHTML = names.map(n => `<span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700">${n}</span>`).join('');
            tt.style.left = (e.clientX + 15) + 'px';
            tt.style.top = (e.clientY + 15) + 'px';
            tt.classList.remove('hidden');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.add('hidden');
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            const temp = document.createElement('input');
            document.body.appendChild(temp);
            temp.value = url;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("已複製連結");
        }

        // 全域放開滑鼠事件，確保結束選取
        window.onmouseup = () => { state.isDragging = false; };
    </script>
</body>
</html>
