<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync - 會議時間調查系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-select { user-select: none; }
        .calendar-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); }
        .slot-active { background-color: #3b82f6 !important; }
        .slot-hover:hover { background-color: #eff6ff; }
        /* 過去時間的樣式 */
        .slot-past { 
            background-color: #f1f5f9 !important; 
            cursor: not-allowed !important;
            opacity: 0.6;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-10">

    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900 text-white px-3 py-2 rounded-xl text-xs shadow-2xl border border-slate-700 hidden">
        <p class="font-bold border-b border-slate-700 pb-1 mb-1.5 flex items-center gap-1.5 text-green-400">
            <i data-lucide="users" class="w-3 h-3"></i> 有空的人：
        </p>
        <div id="tooltip-names" class="flex flex-wrap gap-1 max-w-[180px]"></div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-4 py-2">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black text-blue-600 flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <i data-lucide="calendar" class="w-5 h-5"></i> MeetingSync
            </h1>
            <div id="nav-user-info" class="hidden flex items-center gap-3">
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">
                    <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                    <span id="display-user-name" class="text-xs font-bold text-slate-700"></span>
                </div>
                <button onclick="handleSave()" id="save-btn" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 shadow-sm transition-all">
                    儲存修改
                </button>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-500 p-1 transition-colors" title="登出">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-2 mt-6">
        <div id="view-admin" class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 border border-slate-200 hidden">
            <div class="mb-6 text-center">
                <div class="bg-blue-50 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 text-blue-600">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                </div>
                <h2 class="text-xl font-black">發起新會議</h2>
            </div>
            <div class="space-y-4">
                <input id="new-title" type="text" placeholder="例如：開發進度會議" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                <button onclick="handleCreateMeeting()" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold hover:bg-slate-800 transition-all text-sm">
                    生成調查連結
                </button>
                <div id="link-result" class="mt-6 p-4 bg-green-50 rounded-xl border border-green-100 hidden">
                    <div class="flex items-center gap-2 bg-white p-2 rounded-lg border border-green-200 mb-3">
                        <code id="generated-url" class="flex-1 text-[10px] truncate text-slate-600"></code>
                        <button onclick="copyLink()" class="p-2 text-green-600 hover:bg-green-50 rounded-md" title="複製連結">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <button id="open-link-btn" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-bold hover:bg-green-700 transition-all text-xs flex items-center justify-center gap-2">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        直接前往會議頁面
                    </button>
                </div>
            </div>
        </div>

        <div id="view-auth" class="max-w-sm mx-auto bg-white rounded-3xl shadow-xl p-8 border border-slate-200 hidden">
            <div class="text-center mb-8">
                <div class="bg-indigo-50 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 text-indigo-600">
                    <i data-lucide="log-in" class="w-6 h-6"></i>
                </div>
                <h2 id="auth-meeting-title" class="text-xl font-black italic">載入中...</h2>
                <p class="text-slate-400 text-xs mt-1">請登入以填寫或修改時間</p>
            </div>
            <div class="space-y-4">
                <input id="login-name" type="text" placeholder="您的姓名" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                <input id="login-password" type="password" placeholder="簡易密碼 (修改資料用)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition-all text-sm shadow-lg shadow-blue-100">
                    進入系統
                </button>
            </div>
        </div>

        <div id="view-survey" class="space-y-6 hidden animate-in fade-in duration-500">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <div>
                    <h2 id="survey-title" class="text-xl font-black">會議主題</h2>
                    <p class="text-slate-400 text-xs mt-0.5 italic">選取您的時段，然後點擊上方「儲存修改」</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeWeek(-1)" class="p-2 hover:bg-white rounded-lg transition-all text-slate-600 shadow-sm">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                    <span id="week-display" class="text-xs font-bold px-4 text-slate-700 min-w-[120px] text-center">本週</span>
                    <button onclick="changeWeek(1)" class="p-2 hover:bg-white rounded-lg transition-all text-slate-600 shadow-sm">
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <div class="px-4 py-3 bg-blue-600 text-white flex justify-between items-center">
                        <h3 class="text-sm font-bold flex items-center gap-2"><i data-lucide="mouse-pointer-2" class="w-4 h-4"></i> 您的時間狀態</h3>
                        <span class="text-[10px] bg-white/20 px-2 py-0.5 rounded">點擊或拖拉</span>
                    </div>
                    <div class="overflow-x-auto custom-scroll">
                        <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <div class="px-4 py-3 bg-slate-800 text-white flex justify-between items-center">
                        <h3 class="text-sm font-bold flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> 團隊空檔統計</h3>
                        <span id="participant-count" class="text-[10px] bg-slate-700 px-2 py-0.5 rounded">懸停看姓名</span>
                    </div>
                    <div class="overflow-x-auto custom-scroll">
                        <div id="team-calendar" class="calendar-grid no-select"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '',
            password: '',
            mySlots: {},
            groupData: {},
            totalParticipants: 0,
            isDragging: false,
            dragMode: true,
            currentWeekOffset: 0
        };

        const hours = Array.from({ length: 16 }, (_, i) => i + 7);
        const daysShort = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
        
        const getWeekDates = () => {
            const dates = [];
            const today = new Date();
            
            const currentDay = today.getDay();
            const diffToMonday = currentDay === 0 ? -6 : 1 - currentDay;
            
            const monday = new Date(today);
            monday.setHours(0, 0, 0, 0); // 歸零時間
            monday.setDate(today.getDate() + diffToMonday + (state.currentWeekOffset * 7));
            
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        };

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                document.getElementById('auth-meeting-title').innerText = res?.title || '未知會議';
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return { error: "網路連線異常" };
            }
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value.trim();
            if (!title) return alert("請輸入主題");
            const res = await callAPI({ action: 'createMeeting', title });
            if (res?.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                
                const openBtn = document.getElementById('open-link-btn');
                openBtn.onclick = () => { window.location.href = url; };
                
                document.getElementById('link-result').classList.remove('hidden');
                lucide.createIcons();
            }
        }

        async function handleLogin() {
            const nameInput = document.getElementById('login-name').value.trim();
            const passInput = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('login-btn');

            if (!nameInput || !passInput) return alert("請填寫姓名與密碼");
            
            btn.disabled = true;
            btn.innerText = "驗證身分中...";

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res && res.responses) {
                const myRecord = res.responses.find(r => String(r.name).trim() === nameInput);
                
                if (myRecord) {
                    const dbPass = String(myRecord.password).trim();
                    if (dbPass !== passInput) {
                        btn.disabled = false;
                        btn.innerText = "進入系統";
                        return alert("姓名已存在，但密碼錯誤。請重新輸入或更換姓名。");
                    }
                    try {
                        state.mySlots = typeof myRecord.slots === 'string' ? JSON.parse(myRecord.slots) : (myRecord.slots || {});
                    } catch(e) { state.mySlots = {}; }
                } else {
                    state.mySlots = {};
                }
                
                state.userName = nameInput;
                state.password = passInput;

                processGroupData(res.responses);
                renderCalendars();
                document.getElementById('survey-title').innerText = document.getElementById('auth-meeting-title').innerText;
                document.getElementById('display-user-name').innerText = state.userName;
                document.getElementById('nav-user-info').classList.remove('hidden');
                showView('view-survey');
            } else {
                alert("讀取資料失敗，請重新整理頁面。");
            }
            btn.disabled = false;
            btn.innerText = "進入系統";
        }

        async function handleSave() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "正在儲存...";

            const payload = {
                action: 'saveResponse',
                meetingId: meetingId,
                name: state.userName.trim(),
                password: state.password.trim(),
                slots: JSON.stringify(state.mySlots)
            };

            const res = await callAPI(payload);

            if (res && (res.status === "success" || !res.error)) {
                alert("儲存成功！");
                const fresh = await callAPI({ action: 'getAllResponses', meetingId });
                if (fresh && fresh.responses) {
                    processGroupData(fresh.responses);
                    renderCalendars();
                }
            } else {
                alert("錯誤：" + (res?.error || "儲存失敗"));
            }
            btn.disabled = false;
            btn.innerText = originalText;
        }

        function handleLogout() {
            if(!confirm("確定要登出嗎？")) return;
            window.location.reload();
        }

        function changeWeek(direction) {
            state.currentWeekOffset += direction;
            const weekDisplay = document.getElementById('week-display');
            if (state.currentWeekOffset === 0) weekDisplay.innerText = "本週";
            else weekDisplay.innerText = `第 ${state.currentWeekOffset > 0 ? '+' : ''}${state.currentWeekOffset} 週`;
            renderCalendars();
        }

        function processGroupData(responses) {
            state.groupData = {};
            state.totalParticipants = responses.length;
            responses.forEach(r => {
                try {
                    const slots = typeof r.slots === 'string' ? JSON.parse(r.slots) : (r.slots || {});
                    const rName = String(r.name).trim();
                    Object.keys(slots).forEach(s => {
                        if (slots[s]) {
                            if (!state.groupData[s]) state.groupData[s] = [];
                            if (rName !== state.userName.trim()) {
                                state.groupData[s].push(rName);
                            }
                        }
                    });
                } catch(e) {}
            });
            updateTeamStatsFromMySlots();
        }

        function toggleSlot(key, el, isPast) {
            if (isPast) return; // 禁止修改過去時間
            state.mySlots[key] = state.dragMode;
            if (state.dragMode) el.classList.add('slot-active');
            else el.classList.remove('slot-active');
            updateTeamStatsFromMySlots();
        }

        function updateTeamStatsFromMySlots() {
             const teamCells = document.querySelectorAll('#team-calendar [data-team-key]');
             teamCells.forEach(cell => {
                 const key = cell.dataset.teamKey;
                 const others = state.groupData[key] || [];
                 const names = [...others];
                 if (state.mySlots[key]) names.push(state.userName);
                 
                 const count = names.length;
                 const intensity = state.totalParticipants > 0 ? (count / state.totalParticipants) : 0;
                 
                 if (count > 0) {
                     cell.style.backgroundColor = `rgba(34, 197, 94, ${0.2 + intensity * 0.8})`;
                     cell.innerText = count;
                     cell.onmouseenter = (e) => showTooltip(e, names);
                     cell.onmouseleave = () => hideTooltip();
                 } else {
                     cell.style.backgroundColor = 'transparent';
                     cell.innerText = '';
                     cell.onmouseenter = null;
                 }
             });
        }

        function renderCalendars() {
            const myContainer = document.getElementById('my-calendar');
            const teamContainer = document.getElementById('team-calendar');
            myContainer.innerHTML = '';
            teamContainer.innerHTML = '';
            const currentWeekDates = getWeekDates();
            const now = new Date();

            [myContainer, teamContainer].forEach(c => {
                c.innerHTML += '<div class="w-[50px] border-r border-slate-200 bg-slate-50 sticky left-0 z-20"></div>';
                currentWeekDates.forEach((dateStr, index) => {
                    c.innerHTML += `
                        <div class="text-center py-2 border-r border-slate-100 bg-slate-50">
                            <div class="text-[9px] text-slate-400 font-bold uppercase">${daysShort[index]}</div>
                            <div class="text-[11px] font-black text-slate-700">${dateStr.split('-').slice(1).join('/')}</div>
                        </div>`;
                });
            });

            hours.forEach(hour => {
                [myContainer, teamContainer].forEach(c => {
                    const isMy = c.id === 'my-calendar';
                    const timeLabel = document.createElement('div');
                    timeLabel.className = "w-[50px] h-8 text-[9px] text-slate-400 flex items-center justify-center border-r border-slate-200 bg-slate-50 font-mono border-b border-slate-100 sticky left-0 z-20";
                    timeLabel.innerText = `${String(hour).padStart(2, '0')}:00`;
                    c.appendChild(timeLabel);
                    
                    currentWeekDates.forEach(date => {
                        const key = `${date}-${hour}`;
                        
                        // 檢查是否為過去的時間
                        const slotDate = new Date(date);
                        slotDate.setHours(hour, 0, 0, 0);
                        const isPast = slotDate < now;

                        const el = document.createElement('div');
                        if (isMy) {
                            const active = state.mySlots[key];
                            el.className = `h-8 border-r border-b border-slate-50 cursor-pointer transition-colors ${isPast ? 'slot-past' : 'slot-hover'} ${active ? 'slot-active' : ''}`;
                            
                            if (!isPast) {
                                el.onmousedown = (e) => {
                                    e.preventDefault();
                                    state.dragMode = !state.mySlots[key];
                                    state.isDragging = true;
                                    toggleSlot(key, el, false);
                                };
                                el.onmouseenter = () => { if (state.isDragging) toggleSlot(key, el, false); };
                            }
                            c.appendChild(el);
                        } else {
                            el.className = `h-8 border-r border-b border-slate-50 flex items-center justify-center text-[10px] text-white font-bold ${isPast ? 'bg-slate-50/50' : ''}`;
                            el.dataset.teamKey = key;
                            c.appendChild(el);
                        }
                    });
                });
            });
            updateTeamStatsFromMySlots();
        }

        function showTooltip(e, names) {
            const tt = document.getElementById('tooltip');
            const nameContainer = document.getElementById('tooltip-names');
            nameContainer.innerHTML = names.map(n => `<span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700">${n}</span>`).join('');
            tt.style.left = (e.clientX + 10) + 'px';
            tt.style.top = (e.clientY + 10) + 'px';
            tt.classList.remove('hidden');
        }

        function hideTooltip() { document.getElementById('tooltip').classList.add('hidden'); }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            const temp = document.createElement('input');
            document.body.appendChild(temp);
            temp.value = url;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("連結已複製到剪貼簿");
        }

        window.onmouseup = () => { state.isDragging = false; };
    </script>
</body>
</html>
