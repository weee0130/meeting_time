<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync V6 - Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .calendar-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); }
        .slot { height: 36px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; position: relative; }
        .slot-active { background-color: #3b82f6 !important; }
        .slot-interactive:hover { background-color: #dbeafe; }
        .no-select { user-select: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Toast 通知 -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full bg-slate-800 text-white text-sm font-bold shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none">
        <span id="toast-msg"></span>
    </div>

    <!-- 導航列 -->
    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <i data-lucide="calendar-check" class="text-blue-600 w-6 h-6"></i>
            <span class="font-black text-xl tracking-tighter">MeetingSync <span class="text-blue-600">V6</span></span>
        </div>
        <div id="user-display" class="hidden text-sm font-bold bg-slate-100 px-4 py-1.5 rounded-full text-slate-600"></div>
    </nav>

    <main class="flex-1 overflow-hidden flex flex-col">
        
        <!-- 視圖：建立會議 -->
        <div id="view-admin" class="m-auto max-w-md w-full p-8 bg-white rounded-3xl shadow-xl border hidden">
            <h2 class="text-2xl font-black mb-6">發起新會議</h2>
            <div class="space-y-4">
                <input id="new-title" type="text" placeholder="會議名稱 (例如：小組討論)" class="w-full p-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea id="new-desc" placeholder="補充說明..." class="w-full p-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 h-24 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                <button onclick="createMeeting()" id="admin-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">生成調查連結</button>
                <div id="link-box" class="hidden mt-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <p class="text-xs font-bold text-blue-600 mb-2">邀請連結：</p>
                    <div class="flex items-center gap-2">
                        <code id="share-url" class="text-xs truncate flex-1 text-slate-500"></code>
                        <button onclick="copyUrl()" class="text-blue-600 p-1"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 視圖：身分驗證 -->
        <div id="view-auth" class="m-auto max-w-sm w-full p-8 bg-white rounded-3xl shadow-xl border hidden text-center">
            <h2 id="auth-title" class="text-2xl font-black mb-2">載入中...</h2>
            <p class="text-slate-400 text-sm mb-8">請輸入姓名與密碼以進入</p>
            <div class="space-y-4">
                <input id="auth-name" type="text" placeholder="您的姓名" class="w-full p-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 outline-none">
                <input id="auth-pass" type="password" placeholder="個人識別密碼" class="w-full p-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 outline-none">
                <button onclick="login()" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">進入系統</button>
            </div>
        </div>

        <!-- 視圖：主調查介面 -->
        <div id="view-main" class="flex-1 flex flex-col hidden p-4 lg:p-8 gap-6 min-h-0">
            <div class="flex justify-between items-end">
                <div>
                    <h2 id="main-title" class="text-3xl font-black text-slate-800"></h2>
                    <p id="main-desc" class="text-slate-500 text-sm mt-1"></p>
                </div>
                <button onclick="saveData()" id="save-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> 儲存我的空檔
                </button>
            </div>

            <div class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0">
                <!-- 左側：個人填寫 -->
                <div class="flex-1 bg-white rounded-2xl shadow-sm border flex flex-col overflow-hidden">
                    <div class="bg-slate-800 text-white px-4 py-2 text-xs font-bold flex items-center gap-2">
                        <i data-lucide="user" class="w-3 h-3"></i> 個人填寫區 (點擊或拖曳)
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll no-select" id="grid-personal-container">
                        <div id="grid-personal" class="calendar-grid"></div>
                    </div>
                </div>

                <!-- 右側：團隊統計 -->
                <div class="flex-1 bg-white rounded-2xl shadow-sm border flex flex-col overflow-hidden">
                    <div class="bg-blue-600 text-white px-4 py-2 text-xs font-bold flex items-center justify-between">
                        <div class="flex items-center gap-2"><i data-lucide="users" class="w-3 h-3"></i> 團隊空檔統計</div>
                        <span id="stat-count" class="opacity-80">0 人已填寫</span>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll no-select">
                        <div id="grid-team" class="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');

        let state = {
            name: '', pass: '',
            mySlots: {}, teamData: {},
            isDragging: false, dragValue: false
        };

        const hours = Array.from({ length: 15 }, (_, i) => i + 8); // 08:00 - 22:00
        const days = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                switchView('view-auth');
                const info = await callAPI({ action: 'getMeetingInfo', meetingId });
                document.getElementById('auth-title').innerText = info?.title || "未知的會議";
            } else {
                switchView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await res.json();
            } catch (e) {
                console.error(e);
                return { error: true };
            }
        }

        function switchView(id) {
            ['view-admin', 'view-auth', 'view-main'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toast(msg) {
            const el = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 3000);
        }

        async function createMeeting() {
            const title = document.getElementById('new-title').value;
            if (!title) return toast("請輸入標題");
            document.getElementById('admin-btn').disabled = true;
            const res = await callAPI({ action: 'createMeeting', title, description: document.getElementById('new-desc').value });
            if (res.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('share-url').innerText = url;
                document.getElementById('link-box').classList.remove('hidden');
                toast("會議建立成功！");
            }
        }

        async function login() {
            state.name = document.getElementById('auth-name').value.trim();
            state.pass = document.getElementById('auth-pass').value.trim();
            if (!state.name || !state.pass) return toast("請填寫姓名與密碼");

            document.getElementById('login-btn').innerText = "驗證中...";
            const res = await callAPI({ action: 'getAllResponses', meetingId });
            
            if (res.responses) {
                const mine = res.responses.find(r => r.name === state.name);
                if (mine && String(mine.password) !== String(state.pass)) {
                    toast("密碼錯誤");
                    document.getElementById('login-btn').innerText = "進入系統";
                    return;
                }
                if (mine) state.mySlots = JSON.parse(mine.slots || "{}");
                
                const info = await callAPI({ action: 'getMeetingInfo', meetingId });
                document.getElementById('main-title').innerText = info.title;
                document.getElementById('main-desc').innerText = info.description || "";
                document.getElementById('user-display').innerText = state.name;
                document.getElementById('user-display').classList.remove('hidden');
                
                renderGrids();
                processTeamData(res.responses);
                switchView('view-main');
            }
        }

        function renderGrids() {
            const pGrid = document.getElementById('grid-personal');
            const tGrid = document.getElementById('grid-team');
            pGrid.innerHTML = tGrid.innerHTML = '';

            // Header
            [pGrid, tGrid].forEach(g => {
                g.appendChild(createCell('', 'slot bg-slate-50 sticky top-0 z-10 font-bold text-[10px] flex items-center justify-center'));
                days.forEach(d => g.appendChild(createCell(d, 'slot bg-slate-50 sticky top-0 z-10 font-bold text-xs flex items-center justify-center')));
            });

            // Rows
            hours.forEach(h => {
                const timeStr = `${h}:00`;
                pGrid.appendChild(createCell(timeStr, 'slot bg-slate-50 text-[10px] text-slate-400 flex items-center justify-center'));
                tGrid.appendChild(createCell(timeStr, 'slot bg-slate-50 text-[10px] text-slate-400 flex items-center justify-center'));
                
                for(let d=0; d<7; d++) {
                    const sid = `${d}-${h}`;
                    
                    // Personal Cell
                    const pCell = createCell('', 'slot slot-interactive cursor-pointer');
                    pCell.id = `p-${sid}`;
                    if (state.mySlots[sid]) pCell.classList.add('slot-active');
                    pCell.onmousedown = () => { state.isDragging = true; state.dragValue = !state.mySlots[sid]; toggleSlot(sid); };
                    pCell.onmouseenter = () => { if(state.isDragging) toggleSlot(sid); };
                    pGrid.appendChild(pCell);

                    // Team Cell
                    const tCell = createCell('', 'slot');
                    tCell.id = `t-${sid}`;
                    tGrid.appendChild(tCell);
                }
            });
        }

        function toggleSlot(sid) {
            const el = document.getElementById(`p-${sid}`);
            if (state.dragValue) {
                state.mySlots[sid] = true;
                el.classList.add('slot-active');
            } else {
                delete state.mySlots[sid];
                el.classList.remove('slot-active');
            }
        }

        function createCell(txt, cls) {
            const div = document.createElement('div');
            div.className = cls;
            div.innerText = txt;
            return div;
        }

        function processTeamData(responses) {
            const counts = {};
            responses.forEach(r => {
                const s = JSON.parse(r.slots || "{}");
                Object.keys(s).forEach(sid => {
                    counts[sid] = (counts[sid] || 0) + 1;
                });
            });
            
            const total = responses.length;
            document.getElementById('stat-count').innerText = `${total} 人已填寫`;

            Object.keys(counts).forEach(sid => {
                const cell = document.getElementById(`t-${sid}`);
                if (cell) {
                    const ratio = counts[sid] / total;
                    cell.style.backgroundColor = `rgba(59, 130, 246, ${ratio})`;
                    cell.innerHTML = `<span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold ${ratio > 0.5 ? 'text-white' : 'text-blue-600'}">${counts[sid]}</span>`;
                }
            });
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "儲存中...";
            
            const res = await callAPI({
                action: 'saveResponse',
                meetingId,
                name: state.name,
                password: state.pass,
                slots: JSON.stringify(state.mySlots)
            });

            if (res.status === 'success') {
                toast("儲存成功！");
                const refresh = await callAPI({ action: 'getAllResponses', meetingId });
                processTeamData(refresh.responses);
            }
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> 儲存我的空檔`;
            lucide.createIcons();
        }

        window.onmouseup = () => state.isDragging = false;
        function copyUrl() {
            const txt = document.getElementById('share-url').innerText;
            navigator.clipboard.writeText(txt).then(() => toast("連結已複製"));
        }
    </script>
</body>
</html>
