<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync V7 - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; /* 冷調淡灰色 */
            overflow: hidden;
        } 
        
        .calendar-grid { display: grid; grid-template-columns: 40px repeat(7, 1fr); }
        .slot { height: 26px; border-bottom: 1px solid #edf2f7; border-right: 1px solid #edf2f7; position: relative; transition: all 0.1s; }
        .slot-active { background-color: #2563eb !important; } /* 專業藍 */
        .slot-hover:hover { background-color: #f1f5f9; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 限制單個日曆尺寸 */
        .calendar-container {
            max-width: 480px;
            max-height: 480px;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* 核心布局優化：限制日曆區域的總寬度 */
        .calendar-wrapper {
            max-width: 1050px;
            width: 100%;
            margin: 0 auto;
        }

        .diet-btn { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .diet-btn.active-meat { background-color: #1e293b; color: white; border-color: #1e293b; }
        .diet-btn.active-veg { background-color: #059669; color: white; border-color: #059669; }
        
        .no-select { user-select: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <!-- Toast 通知 -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-lg bg-slate-900 text-white text-sm font-medium shadow-xl opacity-0 pointer-events-none transition-all duration-300">
        <span id="toast-msg"></span>
    </div>

    <!-- 導航欄 -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <i data-lucide="calendar-check-2" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-900">MeetingSync <span class="text-blue-600">Pro</span></h1>
        </div>
        <div id="nav-user-info" class="hidden flex items-center gap-3">
            <div class="flex flex-col items-end">
                <span id="display-user-name" class="text-sm font-bold text-slate-700"></span>
                <span class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">Authenticated User</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-h-0 overflow-hidden bg-slate-50/50">
        
        <!-- 會議建立視圖 -->
        <div id="view-admin" class="m-auto max-w-lg w-full bg-white rounded-xl shadow-sm border border-slate-200 p-10 hidden animate-view">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-900">建立會議調查</h2>
                <p class="text-sm text-slate-500 mt-1">請填寫會議基本資訊以產生同步連結。</p>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">會議標題</label>
                    <input id="new-title" type="text" placeholder="例如：Q3 季度專案審查會議" class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">說明備註 (選填)</label>
                    <textarea id="new-desc" placeholder="請註明會議議程或相關注意事項..." class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm h-28 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <div class="flex items-center gap-3">
                        <i data-lucide="utensils" class="w-4 h-4 text-slate-400"></i>
                        <span class="text-sm font-semibold text-slate-700">啟用飲食需求統計</span>
                    </div>
                    <!-- 修正：移除 checked 屬性，預設不勾選 -->
                    <input type="checkbox" id="new-meal-toggle" class="w-5 h-5 accent-blue-600 cursor-pointer">
                </div>
                <button onclick="handleCreateMeeting()" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-sm hover:bg-blue-700 active:scale-[0.99] transition-all shadow-lg shadow-blue-100">產生調查連結</button>
                
                <div id="link-result" class="hidden space-y-3 mt-8 p-4 bg-blue-50 rounded-lg border border-blue-100 animate-view">
                    <div class="flex items-center gap-2 bg-white p-2.5 rounded-md border border-blue-200">
                        <code id="generated-url" class="text-[11px] truncate flex-1 px-2 text-blue-700 font-mono"></code>
                        <button onclick="copyLink()" class="p-2 hover:bg-blue-50 rounded text-blue-600 transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                    <button id="go-to-link" class="w-full bg-slate-800 text-white py-3 rounded-md font-bold text-xs hover:bg-slate-900 flex items-center justify-center gap-2">
                        前往調查頁面 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 身份驗證視圖 -->
        <div id="view-auth" class="m-auto max-w-sm w-full bg-white rounded-xl shadow-sm border border-slate-200 p-10 hidden text-center animate-view">
            <h2 id="auth-meeting-title" class="text-xl font-bold mb-1 text-slate-900">載入中...</h2>
            <p class="text-[11px] text-slate-400 mb-8 font-medium uppercase tracking-wider">身份辨識與權限驗證</p>
            <div class="space-y-4 text-left">
                <input id="login-name" type="text" placeholder="請輸入姓名" class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input id="login-password" type="password" placeholder="請輸入識別密碼 (以便後續修改)" class="w-full px-4 py-3 rounded-lg border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-sm hover:bg-blue-700 shadow-lg shadow-blue-50 mt-2">進入系統</button>
            </div>
        </div>

        <!-- 會議調查主視圖 -->
        <div id="view-survey" class="flex-1 flex flex-col min-h-0 hidden px-10 py-6 gap-6 overflow-hidden">
            
            <div class="flex justify-between items-start shrink-0">
                <div>
                    <h2 id="survey-title" class="text-2xl font-black text-slate-900 tracking-tight"></h2>
                    <p id="survey-desc" class="text-xs text-slate-500 mt-1 max-w-2xl"></p>
                </div>
                <div class="flex items-center gap-2 bg-white border border-slate-200 p-1 rounded-lg">
                    <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-50 rounded transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="week-display" class="text-xs font-bold px-4 min-w-[100px] text-center text-slate-600">本週</span>
                    <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-50 rounded transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row gap-6 min-h-0 calendar-wrapper items-center justify-center">
                
                <!-- 個人填寫區 -->
                <div class="calendar-container">
                    <div class="px-4 py-3 bg-blue-600 text-white text-[11px] font-bold flex items-center justify-between shrink-0">
                        <div class="flex items-center gap-2 uppercase tracking-widest"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> 個人空檔標記</div>
                        <span class="opacity-70 text-[10px]">滑動選取</span>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                    </div>
                </div>

                <!-- 團隊彙整區 -->
                <div class="calendar-container">
                    <div class="px-4 py-3 bg-slate-800 text-white text-[11px] font-bold flex items-center gap-2 shrink-0">
                        <i data-lucide="users-2" class="w-3.5 h-3.5"></i> 團隊空檔彙整 (Heatmap)
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="team-calendar" class="calendar-grid no-select"></div>
                    </div>
                </div>

            </div>

            <!-- 底部功能與飲食統計 -->
            <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col items-center gap-6 shrink-0 max-w-3xl mx-auto w-full">
                <div id="meal-survey-section" class="w-full flex flex-col items-center gap-3 hidden">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">飲食習慣統計</span>
                    <div id="diet-container" class="flex gap-4 w-full max-w-xs p-1 bg-slate-100 rounded-lg">
                        <button id="btn-meat" onclick="setDiet('葷食')" class="diet-btn flex-1 py-2.5 rounded-md text-xs font-bold bg-white">葷食</button>
                        <button id="btn-veg" onclick="setDiet('素食')" class="diet-btn flex-1 py-2.5 rounded-md text-xs font-bold bg-white">素食</button>
                    </div>
                </div>
                <div class="flex gap-3 w-full max-w-md">
                    <button onclick="handleFinalSave()" id="save-btn" class="flex-1 bg-blue-600 text-white py-4 rounded-lg font-bold text-sm hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> 儲存並同步更新
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900 text-white px-3 py-2 rounded shadow-xl text-[10px] hidden">
        <div id="tooltip-names" class="flex flex-col gap-1"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '', password: '', diet: null,
            mySlots: {}, groupData: {}, meetingInfo: null,
            totalParticipants: 0, isDragging: false, dragMode: true, currentWeekOffset: 0
        };

        const hours = Array.from({ length: 15 }, (_, i) => i + 8); 
        const daysShort = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                state.meetingInfo = res;
                if (!res || res.error) {
                    document.getElementById('auth-meeting-title').innerText = "查無此會議代碼";
                    return;
                }
                document.getElementById('auth-meeting-title').innerText = res.title;
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await response.json();
            } catch (e) {
                showToast("網路連線發生錯誤");
                return { error: "error" };
            }
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'view-survey') {
                document.getElementById('nav-user-info').classList.remove('hidden');
                if (state.meetingInfo?.hasMeal) document.getElementById('meal-survey-section').classList.remove('hidden');
            }
        }

        function setDiet(type) {
            state.diet = type;
            const bMeat = document.getElementById('btn-meat');
            const bVeg = document.getElementById('btn-veg');
            bMeat.className = 'diet-btn flex-1 py-2.5 rounded-md text-xs font-bold bg-white';
            bVeg.className = 'diet-btn flex-1 py-2.5 rounded-md text-xs font-bold bg-white';
            if (type === '葷食') bMeat.classList.add('active-meat');
            else bVeg.classList.add('active-veg');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        async function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!name || !pass) return showToast("請完整填寫姓名與密碼");
            
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerText = "驗證身份中...";

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res?.responses) {
                const mine = res.responses.find(r => String(r.name).trim() === name);
                if (mine && mine.password && String(mine.password) !== String(pass)) {
                    showToast("密碼驗證失敗");
                    btn.disabled = false;
                    btn.innerText = "進入系統";
                    return;
                }
                state.userName = name;
                state.password = pass;
                document.getElementById('display-user-name').innerText = name;
                if (mine) {
                    if (mine.diet && mine.diet !== '未調查') setDiet(mine.diet);
                    try { state.mySlots = JSON.parse(mine.slots || "{}"); } catch(e){}
                }
                initCalendars();
                updateGroupVisuals(res.responses);
                showView('view-survey');
                document.getElementById('survey-title').innerText = state.meetingInfo.title;
                document.getElementById('survey-desc').innerText = state.meetingInfo.description;
            }
            btn.disabled = false;
        }

        async function handleFinalSave() {
            if (state.meetingInfo?.hasMeal && !state.diet) return showToast("請選取飲食習慣");

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 同步資料中...`;
            lucide.createIcons();

            const res = await callAPI({
                action: 'saveResponse', meetingId, name: state.userName, password: state.password,
                diet: state.diet || '未調查', slots: JSON.stringify(state.mySlots)
            });

            if (res.success || res.status === "success") {
                showToast("儲存成功，正在同步團隊資訊...");
                // 核心優化：立即重新抓取全體資料並更新 Heatmap
                const refresh = await callAPI({ action: 'getAllResponses', meetingId });
                if (refresh.responses) {
                    updateGroupVisuals(refresh.responses);
                }
            } else {
                showToast("儲存失敗：" + (res.error || "未知錯誤"));
            }
            
            btn.disabled = false;
            btn.innerHTML = originalHTML;
            lucide.createIcons();
        }

        function initCalendars() {
            renderGrid('my-calendar', true);
            renderGrid('team-calendar', false);
        }

        function renderGrid(containerId, isInteractive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const dates = getWeekDates();
            
            container.appendChild(createCell('', 'slot bg-slate-50 border-b border-r'));
            dates.forEach((date, i) => {
                const cell = createCell('', 'slot bg-slate-50 border-b border-r flex flex-col items-center justify-center leading-tight');
                cell.innerHTML = `<span class="text-[7px] text-slate-400 font-bold">${daysShort[i]}</span><span class="text-[10px] font-extrabold text-slate-600">${date.split('-')[2]}</span>`;
                container.appendChild(cell);
            });

            hours.forEach(hour => {
                container.appendChild(createCell(`${hour}:00`, 'slot text-[9px] text-slate-300 font-medium flex items-center justify-center bg-slate-50/50'));
                dates.forEach(date => {
                    const sid = `${date}_${hour}`;
                    const cell = createCell('', `slot ${isInteractive ? 'slot-hover cursor-pointer' : ''}`);
                    cell.id = `${containerId}-${sid}`;
                    if (isInteractive) {
                        if (state.mySlots[sid]) cell.classList.add('slot-active');
                        cell.onmousedown = (e) => { 
                            if (e.button !== 0) return;
                            state.isDragging = true; 
                            state.dragMode = !cell.classList.contains('slot-active'); 
                            toggleSlot(sid, cell); 
                        };
                        cell.onmouseenter = () => { if (state.isDragging) toggleSlot(sid, cell); };
                    } else {
                        cell.onmouseenter = (e) => showTooltip(e, sid);
                        cell.onmouseleave = hideTooltip;
                    }
                    container.appendChild(cell);
                });
            });
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            return div;
        }

        function toggleSlot(id, el) {
            if (state.dragMode) { state.mySlots[id] = true; el.classList.add('slot-active'); }
            else { delete state.mySlots[id]; el.classList.remove('slot-active'); }
        }

        function updateGroupVisuals(responses) {
            state.groupData = {};
            state.totalParticipants = responses.length;
            responses.forEach(r => {
                const s = JSON.parse(r.slots || "{}");
                Object.keys(s).forEach(sid => {
                    if (!state.groupData[sid]) state.groupData[sid] = [];
                    state.groupData[sid].push({ name: r.name, diet: r.diet });
                });
            });
            
            const dates = getWeekDates();
            hours.forEach(h => {
                dates.forEach(d => {
                    const sid = `${d}_${h}`;
                    const cell = document.getElementById(`team-calendar-${sid}`);
                    if (!cell) return;
                    
                    const users = state.groupData[sid] || [];
                    const count = users.length;
                    const ratio = state.totalParticipants > 0 ? count / state.totalParticipants : 0;
                    
                    cell.style.backgroundColor = count > 0 ? `rgba(37, 99, 235, ${0.1 + ratio * 0.9})` : '';
                    cell.innerHTML = count > 0 ? `<span class="absolute inset-0 flex items-center justify-center text-[9px] font-bold ${ratio > 0.6 ? 'text-white' : 'text-blue-700'}">${count}</span>` : '';
                });
            });
        }

        function getWeekDates() {
            const dates = [];
            const today = new Date();
            const diff = today.getDay() === 0 ? -6 : 1 - today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() + diff + (state.currentWeekOffset * 7));
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function changeWeek(offset) {
            state.currentWeekOffset += offset;
            document.getElementById('week-display').innerText = state.currentWeekOffset === 0 ? '本週' : (state.currentWeekOffset > 0 ? `未來 ${state.currentWeekOffset} 週` : `過去 ${Math.abs(state.currentWeekOffset)} 週`);
            initCalendars();
            if (state.userName) handleLogin();
        }

        function showTooltip(e, sid) {
            const users = state.groupData[sid];
            if (!users) return;
            const tt = document.getElementById('tooltip');
            const list = document.getElementById('tooltip-names');
            list.innerHTML = `<span class="font-bold border-b border-slate-700 mb-1 pb-1">可參加人員 (${users.length})</span>`;
            users.forEach(u => {
                const s = document.createElement('span');
                s.innerText = `• ${u.name} (${u.diet})`;
                list.appendChild(s);
            });
            tt.classList.remove('hidden');
            tt.style.left = (e.pageX + 10) + 'px'; tt.style.top = (e.pageY + 10) + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').classList.add('hidden'); }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            const hasMeal = document.getElementById('new-meal-toggle').checked;
            if (!title) return showToast("標題為必填項目");
            
            const res = await callAPI({ action: 'createMeeting', title, description: desc, hasMeal });
            if (res?.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                document.getElementById('link-result').classList.remove('hidden');
                document.getElementById('go-to-link').onclick = () => window.location.href = url;
                lucide.createIcons();
            }
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            const el = document.createElement('textarea');
            el.value = url; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            showToast("連結已複製至剪貼簿");
        }

        window.onmouseup = () => state.isDragging = false;
    </script>
</body>
</html>
