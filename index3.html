<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync V7 - Stable Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            overflow: hidden;
        } 
        
        .calendar-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); }
        .slot { height: 34px; border-bottom: 1px solid #edf2f7; border-right: 1px solid #edf2f7; position: relative; transition: all 0.1s; }
        .slot-active { background-color: #2563eb !important; }
        .slot-hover:hover { background-color: #f1f5f9; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .calendar-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 15px -3px rgb(0 0 0 / 0.05);
        }

        .diet-btn { transition: all 0.2s; border: 2px solid transparent; }
        .diet-btn.active { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
        
        .no-select { user-select: none; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <!-- Toast 通知系統 -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl bg-slate-900 text-white text-sm font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-300 transform scale-90">
        <span id="toast-msg"></span>
    </div>

    <!-- 導航列 -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-200">
                <i data-lucide="calendar-range" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-xl font-black text-slate-900 tracking-tight">MeetingSync <span class="text-blue-600">V7</span></h1>
        </div>
        <div id="nav-user-info" class="hidden flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
            </div>
            <span id="display-user-name" class="text-sm font-bold text-slate-700"></span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-h-0 overflow-hidden">
        
        <!-- 管理端：建立會議 -->
        <div id="view-admin" class="m-auto max-w-md w-full bg-white rounded-3xl shadow-2xl border p-10 hidden">
            <h2 class="text-2xl font-black mb-8 text-slate-900 text-center">發起新會議</h2>
            <div class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">會議主題</label>
                    <input id="new-title" type="text" placeholder="例如：期中進度匯報" class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">補充說明</label>
                    <textarea id="new-desc" placeholder="請大家標記這週可以討論的時間..." class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 h-24 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl">
                    <div class="flex items-center gap-2">
                        <i data-lucide="utensils" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-bold text-blue-900">同步統計飲食需求</span>
                    </div>
                    <input type="checkbox" id="new-meal-toggle" class="w-5 h-5 accent-blue-600" checked>
                </div>
                <button onclick="handleCreateMeeting()" id="create-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 active:scale-[0.98] transition-all">生成邀請連結</button>
                
                <div id="link-result" class="hidden space-y-3 mt-8 p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <p class="text-[10px] font-black text-emerald-600 uppercase">邀請連結已就緒</p>
                    <div class="flex items-center gap-2 bg-white p-3 rounded-xl border border-emerald-200">
                        <code id="generated-url" class="text-xs truncate flex-1 text-slate-600 font-mono"></code>
                        <button onclick="copyLink()" class="p-2 hover:bg-emerald-50 rounded-lg text-emerald-600 transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 驗證端：進入會議 -->
        <div id="view-auth" class="m-auto max-w-sm w-full bg-white rounded-3xl shadow-2xl border p-10 hidden text-center">
            <h2 id="auth-meeting-title" class="text-2xl font-black text-slate-900 mb-2 tracking-tight">載入中...</h2>
            <p class="text-sm text-slate-400 mb-8 font-medium">請輸入姓名與密碼以同步資料</p>
            <div class="space-y-4 text-left">
                <input id="login-name" type="text" placeholder="您的姓名" class="w-full px-5 py-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="login-password" type="password" placeholder="識別密碼 (供日後修改使用)" class="w-full px-5 py-4 rounded-xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">進入調查頁面</button>
            </div>
        </div>

        <!-- 主界面：填寫與結果 -->
        <div id="view-survey" class="flex-1 flex flex-col min-h-0 hidden p-6 gap-6">
            <!-- 標題資訊 -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 px-2">
                <div>
                    <h2 id="survey-title" class="text-3xl font-black text-slate-900 leading-tight"></h2>
                    <p id="survey-desc" class="text-sm text-slate-500 mt-1 max-w-lg"></p>
                </div>
                <div class="flex items-center gap-2 bg-white border border-slate-200 p-1 rounded-2xl shadow-sm shrink-0">
                    <button onclick="changeWeek(-1)" class="p-2.5 hover:bg-slate-50 rounded-xl transition-colors"><i data-lucide="chevron-left" class="w-5 h-5 text-slate-600"></i></button>
                    <span id="week-display" class="text-xs font-black px-4 min-w-[100px] text-center text-slate-700 uppercase tracking-widest">本週</span>
                    <button onclick="changeWeek(1)" class="p-2.5 hover:bg-slate-50 rounded-xl transition-colors"><i data-lucide="chevron-right" class="w-5 h-5 text-slate-600"></i></button>
                </div>
            </div>

            <!-- 日曆區域 -->
            <div class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0 overflow-hidden">
                <!-- 個人填寫區 -->
                <div class="calendar-container">
                    <div class="px-5 py-3 bg-slate-900 text-white text-[11px] font-black flex items-center justify-between shrink-0 tracking-widest uppercase">
                        <div class="flex items-center gap-2"><i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5 text-blue-400"></i> 個人時間標記</div>
                        <div id="save-status" class="hidden flex items-center gap-2"><span class="w-2 h-2 bg-blue-400 rounded-full animate-ping"></span> Syncing</div>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                    </div>
                </div>

                <!-- 團隊空檔區 -->
                <div class="calendar-container">
                    <div class="px-5 py-3 bg-blue-600 text-white text-[11px] font-black flex items-center justify-between shrink-0 tracking-widest uppercase">
                        <div class="flex items-center gap-2"><i data-lucide="users" class="w-3.5 h-3.5 text-blue-200"></i> 團隊空檔熱圖</div>
                        <span id="total-count-badge" class="bg-blue-700 px-3 py-0.5 rounded-full text-[10px]">0 人</span>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="team-calendar" class="calendar-grid no-select"></div>
                    </div>
                </div>
            </div>

            <!-- 下方控制區 -->
            <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-xl flex flex-col md:flex-row items-center gap-6 shrink-0 max-w-6xl mx-auto w-full mb-2">
                <div id="meal-survey-section" class="flex-1 flex items-center gap-6 hidden w-full">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">飲食統計</span>
                    <div class="flex gap-2 w-full">
                        <button id="btn-meat" onclick="setDiet('葷食')" class="diet-btn flex-1 py-3.5 rounded-xl text-sm font-bold bg-slate-50 text-slate-600 flex items-center justify-center gap-2">
                            <i data-lucide="beef" class="w-4 h-4"></i> 葷食
                        </button>
                        <button id="btn-veg" onclick="setDiet('素食')" class="diet-btn flex-1 py-3.5 rounded-xl text-sm font-bold bg-slate-50 text-slate-600 flex items-center justify-center gap-2">
                            <i data-lucide="leaf" class="w-4 h-4"></i> 素食
                        </button>
                    </div>
                </div>
                <button onclick="handleFinalSave()" id="save-btn" class="w-full md:w-80 bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-200">
                    <i data-lucide="cloud-upload" class="w-6 h-6"></i> 儲存我的空檔
                </button>
            </div>
        </div>
    </main>

    <!-- 熱圖提示工具 (Tooltip) -->
    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900/95 backdrop-blur-sm text-white px-5 py-4 rounded-2xl shadow-2xl text-[11px] hidden border border-slate-700 transform -translate-x-1/2 -translate-y-full mb-4 min-w-[150px]">
        <div id="tooltip-names" class="flex flex-col gap-2"></div>
    </div>

    <script>
        // 配置：請更換為您的 Google Apps Script URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '', password: '', diet: null,
            mySlots: {}, groupData: {}, meetingInfo: null,
            isDragging: false, dragMode: true, currentWeekOffset: 0,
            allResponses: []
        };

        const hours = Array.from({ length: 15 }, (_, i) => i + 8); // 08:00 - 22:00
        const daysLabel = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                if (res && res.title) {
                    state.meetingInfo = res;
                    document.getElementById('auth-meeting-title').innerText = res.title;
                } else {
                    document.getElementById('auth-meeting-title').innerText = "找不到會議資訊";
                }
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return { error: true };
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('scale-90', 'scale-100');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('scale-100', 'scale-90');
            }, 3000);
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!name || !pass) return showToast("請完整輸入姓名與密碼");
            
            const btn = document.getElementById('login-btn');
            btn.innerText = "驗證中...";
            btn.disabled = true;

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res.error) {
                showToast("連線失敗，請檢查網路");
                btn.disabled = false;
                btn.innerText = "進入調查頁面";
                return;
            }

            const mine = res.responses?.find(r => r.name === name);
            if (mine && String(mine.password) !== String(pass)) {
                showToast("此姓名已被使用，密碼錯誤");
                btn.disabled = false;
                btn.innerText = "進入調查頁面";
                return;
            }

            state.userName = name;
            state.password = pass;
            state.allResponses = res.responses || [];
            document.getElementById('display-user-name').innerText = name;
            document.getElementById('nav-user-info').classList.remove('hidden');
            
            if (mine) {
                if (mine.diet && mine.diet !== '不需要') setDiet(mine.diet);
                try { state.mySlots = JSON.parse(mine.slots || "{}"); } catch(e){}
            }

            initCalendars();
            updateHeatmap(state.allResponses);
            showView('view-survey');
            document.getElementById('survey-title').innerText = state.meetingInfo.title;
            document.getElementById('survey-desc').innerText = state.meetingInfo.description || "點擊方格以標記您的空檔，右側可查看團隊熱門時段。";
            if (state.meetingInfo.hasMeal) document.getElementById('meal-survey-section').classList.remove('hidden');
            lucide.createIcons();
        }

        async function handleFinalSave() {
            if (state.meetingInfo.hasMeal && !state.diet) return showToast("請選擇您的飲食需求");
            
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('save-status');
            btn.disabled = true;
            btn.innerText = "正在同步...";
            status.classList.remove('hidden');

            const res = await callAPI({
                action: 'saveResponse', 
                meetingId, 
                name: state.userName, 
                password: state.password,
                diet: state.diet || '不需要', 
                slots: JSON.stringify(state.mySlots)
            });

            if (res.status === 'success' || res.success) {
                showToast("空檔資料已儲存成功！");
                const refresh = await callAPI({ action: 'getAllResponses', meetingId });
                if (refresh.responses) {
                    state.allResponses = refresh.responses;
                    updateHeatmap(state.allResponses);
                }
            } else {
                showToast("儲存失敗: " + (res.error || "未知錯誤"));
            }
            
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="cloud-upload" class="w-6 h-6"></i> 儲存我的空檔`;
            status.classList.add('hidden');
            lucide.createIcons();
        }

        function updateHeatmap(responses) {
            state.groupData = {};
            const total = responses.length;
            document.getElementById('total-count-badge').innerText = `${total} 人填寫`;
            
            responses.forEach(r => {
                let s = {};
                try { s = JSON.parse(r.slots || "{}"); } catch(e){}
                Object.keys(s).forEach(sid => {
                    if (!state.groupData[sid]) state.groupData[sid] = [];
                    state.groupData[sid].push({ name: r.name, diet: r.diet });
                });
            });

            const cells = document.querySelectorAll('[id^="team-calendar-"]');
            cells.forEach(cell => {
                const sid = cell.id.replace('team-calendar-', '');
                const list = state.groupData[sid] || [];
                const ratio = total > 0 ? list.length / total : 0;
                
                if (list.length > 0) {
                    cell.style.backgroundColor = `rgba(37, 99, 235, ${0.1 + (ratio * 0.8)})`;
                    cell.innerHTML = `<span class="absolute inset-0 flex items-center justify-center text-[10px] font-black ${ratio > 0.6 ? 'text-white' : 'text-blue-600'}">${list.length}</span>`;
                } else {
                    cell.style.backgroundColor = '';
                    cell.innerHTML = '';
                }
            });
        }

        function initCalendars() {
            renderGrid('my-calendar', true);
            renderGrid('team-calendar', false);
        }

        function renderGrid(containerId, isInteractive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // Header
            container.appendChild(createCell('', 'slot bg-slate-50 sticky top-0 z-10 border-b-2 border-slate-200'));
            daysLabel.forEach(day => {
                const cell = createCell(day, 'slot bg-slate-50 sticky top-0 z-10 border-b-2 border-slate-200 text-[10px] font-black flex items-center justify-center text-slate-500 uppercase tracking-tighter');
                container.appendChild(cell);
            });

            // Rows
            hours.forEach(hour => {
                container.appendChild(createCell(`${hour}:00`, 'slot text-[9px] text-slate-400 font-bold flex items-center justify-center bg-slate-50 border-r-2 border-slate-200'));
                for(let d=0; d<7; d++) {
                    const sid = `${d}-${hour}`;
                    const cell = createCell('', `slot ${isInteractive ? 'slot-hover cursor-pointer' : ''}`);
                    cell.id = `${containerId}-${sid}`;
                    if (isInteractive) {
                        if (state.mySlots[sid]) cell.classList.add('slot-active');
                        cell.onmousedown = (e) => { 
                            if (e.button !== 0) return;
                            state.isDragging = true; 
                            state.dragMode = !cell.classList.contains('slot-active'); 
                            toggleSlot(sid, cell); 
                        };
                        cell.onmouseenter = () => { if (state.isDragging) toggleSlot(sid, cell); };
                    } else {
                        cell.onmouseenter = (e) => showTooltip(e, sid);
                        cell.onmouseleave = hideTooltip;
                    }
                    container.appendChild(cell);
                }
            });
        }

        function toggleSlot(sid, el) {
            if (state.dragMode) { state.mySlots[sid] = true; el.classList.add('slot-active'); }
            else { delete state.mySlots[sid]; el.classList.remove('slot-active'); }
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            return div;
        }

        function setDiet(type) {
            state.diet = type;
            document.getElementById('btn-meat').classList.toggle('active', type === '葷食');
            document.getElementById('btn-veg').classList.toggle('active', type === '素食');
        }

        function showTooltip(e, sid) {
            const users = state.groupData[sid];
            if (!users) return;
            const tt = document.getElementById('tooltip');
            const list = document.getElementById('tooltip-names');
            list.innerHTML = `<div class="font-black border-b border-slate-700 mb-2 pb-1 text-blue-400 uppercase tracking-widest text-[9px]">可出席名單 (${users.length})</div>`;
            users.forEach(u => {
                const s = document.createElement('div');
                s.className = "flex justify-between items-center gap-4";
                s.innerHTML = `<span class="font-bold">${u.name}</span><span class="opacity-40 text-[9px]">${u.diet}</span>`;
                list.appendChild(s);
            });
            tt.classList.remove('hidden');
            tt.style.left = e.pageX + 'px'; tt.style.top = (e.pageY - 10) + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').classList.add('hidden'); }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value.trim();
            if (!title) return showToast("請輸入會議標題");
            
            const btn = document.getElementById('create-btn');
            btn.innerText = "正在建立中...";
            btn.disabled = true;

            const res = await callAPI({ 
                action: 'createMeeting', 
                title, 
                description: document.getElementById('new-desc').value.trim(), 
                hasMeal: document.getElementById('new-meal-toggle').checked 
            });
            
            if (res.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                document.getElementById('link-result').classList.remove('hidden');
                showToast("會議連結已生成！");
            } else {
                showToast("建立失敗，請確認 GAS 權限設定");
            }
            btn.innerText = "生成邀請連結";
            btn.disabled = false;
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(url).then(() => showToast("連結已複製到剪貼簿"));
        }

        window.onmouseup = () => state.isDragging = false;
        function changeWeek(offset) { showToast("多週切換功能將在 V8 開放"); }
    </script>
</body>
</html>
