<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync V9 - Robust Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            overflow: hidden;
        } 
        
        .calendar-grid { display: grid; grid-template-columns: 45px repeat(7, 1fr); }
        .slot { height: 28px; border-bottom: 1px solid #edf2f7; border-right: 1px solid #edf2f7; position: relative; transition: background-color 0.2s; }
        .slot-active { background-color: #2563eb !important; }
        .slot-hover:hover { background-color: #f1f5f9; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .calendar-container {
            max-width: 480px;
            max-height: 500px;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }

        .diet-btn { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .diet-btn.active-meat { background-color: #1e293b; color: white; border-color: #1e293b; }
        .diet-btn.active-veg { background-color: #059669; color: white; border-color: #059669; }
        
        .no-select { user-select: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-lg bg-slate-900 text-white text-sm font-medium shadow-2xl opacity-0 pointer-events-none transition-all duration-300 transform scale-90">
        <span id="toast-msg"></span>
    </div>

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="bg-blue-600 p-1.5 rounded-lg shadow-md">
                <i data-lucide="calendar-check-2" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-extrabold text-slate-900">MeetingSync <span class="text-blue-600">V9</span></h1>
        </div>
        <div id="nav-user-info" class="hidden flex items-center gap-4">
            <span id="display-user-name" class="text-sm font-bold text-slate-700"></span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-h-0 overflow-hidden bg-slate-50">
        
        <!-- 管理端：建立會議 -->
        <div id="view-admin" class="m-auto max-w-lg w-full bg-white rounded-2xl shadow-xl border p-10 hidden animate-view">
            <h2 class="text-2xl font-black mb-6 text-slate-900">建立會議調查</h2>
            <div class="space-y-6">
                <input id="new-title" type="text" placeholder="會議標題" class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="new-desc" placeholder="說明文字" class="w-full px-4 py-3 rounded-xl border h-24 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl">
                    <span class="text-sm font-bold">統計飲食需求</span>
                    <input type="checkbox" id="new-meal-toggle" class="w-5 h-5" checked>
                </div>
                <button onclick="handleCreateMeeting()" id="create-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">生成邀請連結</button>
                
                <div id="link-result" class="hidden space-y-3 mt-8 p-5 bg-emerald-50 rounded-xl border border-emerald-100 animate-view">
                    <div class="flex items-center gap-2 bg-white p-2.5 rounded-lg border">
                        <code id="generated-url" class="text-[11px] truncate flex-1 text-emerald-700 font-mono"></code>
                        <button onclick="copyLink()" class="p-2 hover:bg-emerald-50 rounded-md text-emerald-600"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                    <button id="go-to-link" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-xs flex items-center justify-center gap-2">
                        進入調查頁 <i data-lucide="external-link" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 登入端：身份驗證 -->
        <div id="view-auth" class="m-auto max-w-sm w-full bg-white rounded-2xl shadow-xl border p-10 hidden text-center animate-view">
            <h2 id="auth-meeting-title" class="text-xl font-black text-slate-900 mb-6">載入中...</h2>
            <div class="space-y-4 text-left">
                <input id="login-name" type="text" placeholder="您的姓名" class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-blue-500">
                <input id="login-password" type="password" placeholder="個人識別密碼" class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">進入調查</button>
            </div>
        </div>

        <!-- 主界面：調查與團隊日曆 -->
        <div id="view-survey" class="flex-1 flex flex-col min-h-0 hidden px-10 py-6 gap-6 overflow-hidden">
            <div class="flex justify-between items-end shrink-0">
                <div>
                    <h2 id="survey-title" class="text-2xl font-black text-slate-900"></h2>
                    <p id="survey-desc" class="text-xs text-slate-500 mt-1"></p>
                </div>
                <div class="flex items-center gap-2 bg-white border p-1 rounded-xl shadow-sm">
                    <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-50 rounded-lg"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="week-display" class="text-xs font-black px-4 min-w-[110px] text-center">本週</span>
                    <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-50 rounded-lg"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row gap-8 min-h-0 items-center justify-center overflow-hidden">
                <!-- 個人填寫 -->
                <div class="calendar-container">
                    <div class="px-4 py-3 bg-blue-600 text-white text-[10px] font-black flex items-center justify-between shrink-0 uppercase tracking-widest">
                        <div class="flex items-center gap-2"><i data-lucide="mouse-pointer-2" class="w-3.5 h-3.5"></i> 個人標記</div>
                        <div id="save-status" class="hidden flex items-center gap-1.5"><div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>同步中</div>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                    </div>
                </div>

                <!-- 團隊空檔 -->
                <div class="calendar-container">
                    <div class="px-4 py-3 bg-emerald-700 text-white text-[10px] font-black flex items-center justify-between shrink-0 uppercase tracking-widest">
                        <div class="flex items-center gap-2"><i data-lucide="users-2" class="w-3.5 h-3.5"></i> 團隊空檔</div>
                        <span id="total-count-badge" class="bg-emerald-800 px-2 py-0.5 rounded">0 人參與</span>
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll">
                        <div id="team-calendar" class="calendar-grid no-select"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white border rounded-2xl p-6 shadow-xl flex flex-col items-center gap-4 shrink-0 max-w-4xl mx-auto w-full mb-2">
                <div id="meal-survey-section" class="w-full flex flex-col items-center gap-2 hidden">
                    <span class="text-[10px] font-black text-slate-400 uppercase">飲食確認</span>
                    <div class="flex gap-4 w-full max-w-sm p-1.5 bg-slate-100 rounded-xl">
                        <button id="btn-meat" onclick="setDiet('葷食')" class="diet-btn flex-1 py-3 rounded-lg text-xs font-black bg-white">葷食</button>
                        <button id="btn-veg" onclick="setDiet('素食')" class="diet-btn flex-1 py-3 rounded-lg text-xs font-black bg-white">素食</button>
                    </div>
                </div>
                <button onclick="handleFinalSave()" id="save-btn" class="w-full max-w-lg bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="save" class="w-5 h-5"></i> 儲存並更新回覆
                </button>
            </div>
        </div>
    </main>

    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900/95 backdrop-blur-sm text-white px-4 py-3 rounded-xl shadow-2xl text-[10px] hidden border border-slate-700 transform -translate-x-1/2 -translate-y-full mb-4">
        <div id="tooltip-names" class="flex flex-col gap-1.5"></div>
    </div>

    <script>
        // 確保這段 URL 是正確的 Google Apps Script 佈署連結
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '', password: '', diet: null,
            mySlots: {}, groupData: {}, meetingInfo: null,
            totalParticipants: 0, isDragging: false, dragMode: true, currentWeekOffset: 0,
            allResponses: []
        };

        const hours = Array.from({ length: 15 }, (_, i) => i + 8); 
        const daysShort = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                if (!res || res.error) {
                    document.getElementById('auth-meeting-title').innerText = "連結無效或網路錯誤";
                    return;
                }
                state.meetingInfo = res;
                document.getElementById('auth-meeting-title').innerText = res.title;
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                // 增加 timeout 或更穩定的 fetch 處理
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', // 某些 GAS 環境可能需要
                    body: JSON.stringify(data) 
                });
                
                // 注意：如果使用 no-cors，無法獲取 JSON 內容
                // 這邊改回標準 mode，但加入 try-catch
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                return { error: true, message: e.message };
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('scale-90', 'scale-100');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('scale-100', 'scale-90');
            }, 3000);
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'view-survey' && state.meetingInfo?.hasMeal) {
                document.getElementById('meal-survey-section').classList.remove('hidden');
            }
        }

        async function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!name || !pass) return showToast("請輸入姓名與密碼");
            
            const btn = document.getElementById('login-btn');
            btn.innerText = "驗證中...";
            btn.disabled = true;

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res.error) {
                showToast("連線失敗，請檢查網路");
                btn.disabled = false;
                btn.innerText = "進入調查";
                return;
            }

            const mine = res.responses?.find(r => r.name === name);
            if (mine && mine.password && String(mine.password) !== String(pass)) {
                showToast("識別密碼不正確");
                btn.disabled = false;
                btn.innerText = "進入調查";
                return;
            }

            state.userName = name;
            state.password = pass;
            state.allResponses = res.responses || [];
            document.getElementById('display-user-name').innerText = name;
            
            if (mine) {
                if (mine.diet) setDiet(mine.diet);
                try { state.mySlots = JSON.parse(mine.slots || "{}"); } catch(e){}
            }

            initCalendars();
            updateGroupVisuals(state.allResponses);
            showView('view-survey');
            document.getElementById('survey-title').innerText = state.meetingInfo.title;
            document.getElementById('survey-desc').innerText = state.meetingInfo.description;
        }

        async function handleFinalSave() {
            if (state.meetingInfo.hasMeal && !state.diet) return showToast("請選擇飲食習慣");
            
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('save-status');
            
            btn.disabled = true;
            btn.innerText = "同步中...";
            status.classList.remove('hidden');

            try {
                const res = await callAPI({
                    action: 'saveResponse', 
                    meetingId, 
                    name: state.userName, 
                    password: state.password,
                    diet: state.diet || '未調查', 
                    slots: JSON.stringify(state.mySlots)
                });

                if (res.success) {
                    showToast("同步成功");
                    // 強制重整團隊資料
                    const refresh = await callAPI({ action: 'getAllResponses', meetingId });
                    if (refresh.responses) {
                        state.allResponses = refresh.responses;
                        updateGroupVisuals(state.allResponses);
                    }
                } else {
                    throw new Error("Server rejected");
                }
            } catch (e) {
                showToast("同步失敗，請再試一次");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> 儲存並更新回覆`;
                status.classList.add('hidden');
                lucide.createIcons();
            }
        }

        function updateGroupVisuals(responses) {
            state.groupData = {};
            state.totalParticipants = responses.length;
            document.getElementById('total-count-badge').innerText = `${state.totalParticipants} 人參與`;
            
            responses.forEach(r => {
                let s = {};
                try { s = JSON.parse(r.slots || "{}"); } catch(e){}
                Object.keys(s).forEach(sid => {
                    if (!state.groupData[sid]) state.groupData[sid] = [];
                    state.groupData[sid].push({ name: r.name, diet: r.diet });
                });
            });

            const dates = getWeekDates();
            hours.forEach(h => {
                dates.forEach(d => {
                    const sid = `${d}_${h}`;
                    const cell = document.getElementById(`team-calendar-${sid}`);
                    if (!cell) return;
                    
                    const list = state.groupData[sid] || [];
                    const ratio = state.totalParticipants > 0 ? list.length / state.totalParticipants : 0;
                    
                    if (list.length > 0) {
                        cell.style.backgroundColor = `rgba(16, 185, 129, ${0.1 + (ratio * 0.9)})`;
                        cell.innerHTML = `<span class="absolute inset-0 flex items-center justify-center text-[10px] font-black ${ratio > 0.6 ? 'text-white' : 'text-emerald-900'}">${list.length}</span>`;
                    } else {
                        cell.style.backgroundColor = '';
                        cell.innerHTML = '';
                    }
                });
            });
        }

        function initCalendars() {
            renderGrid('my-calendar', true);
            renderGrid('team-calendar', false);
        }

        function renderGrid(containerId, isInteractive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const dates = getWeekDates();
            
            container.appendChild(createCell('', 'slot bg-slate-50 sticky top-0 z-10'));
            dates.forEach((date, i) => {
                const cell = createCell('', 'slot bg-slate-50 flex flex-col items-center justify-center sticky top-0 z-10');
                cell.innerHTML = `<span class="text-[7px] text-slate-400 font-black">${daysShort[i]}</span><span class="text-[11px] font-black">${date.split('-')[2]}</span>`;
                container.appendChild(cell);
            });

            hours.forEach(hour => {
                container.appendChild(createCell(`${hour}:00`, 'slot text-[9px] text-slate-400 font-bold flex items-center justify-center bg-slate-50'));
                dates.forEach(date => {
                    const sid = `${date}_${hour}`;
                    const cell = createCell('', `slot ${isInteractive ? 'slot-hover cursor-pointer' : ''}`);
                    cell.id = `${containerId}-${sid}`;
                    if (isInteractive) {
                        if (state.mySlots[sid]) cell.classList.add('slot-active');
                        cell.onmousedown = (e) => { 
                            if (e.button !== 0) return;
                            state.isDragging = true; 
                            state.dragMode = !cell.classList.contains('slot-active'); 
                            toggleSlot(sid, cell); 
                        };
                        cell.onmouseenter = () => { if (state.isDragging) toggleSlot(sid, cell); };
                    } else {
                        cell.onmouseenter = (e) => showTooltip(e, sid);
                        cell.onmouseleave = hideTooltip;
                    }
                    container.appendChild(cell);
                });
            });
        }

        function toggleSlot(id, el) {
            if (state.dragMode) { state.mySlots[id] = true; el.classList.add('slot-active'); }
            else { delete state.mySlots[id]; el.classList.remove('slot-active'); }
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            return div;
        }

        function setDiet(type) {
            state.diet = type;
            document.getElementById('btn-meat').className = 'diet-btn flex-1 py-3 rounded-lg text-xs font-black bg-white';
            document.getElementById('btn-veg').className = 'diet-btn flex-1 py-3 rounded-lg text-xs font-black bg-white';
            if (type === '葷食') document.getElementById('btn-meat').classList.add('active-meat');
            else document.getElementById('btn-veg').classList.add('active-veg');
        }

        function getWeekDates() {
            const dates = [];
            const today = new Date();
            const diff = today.getDay() === 0 ? -6 : 1 - today.getDay();
            const mon = new Date(today);
            mon.setDate(today.getDate() + diff + (state.currentWeekOffset * 7));
            for (let i = 0; i < 7; i++) {
                const d = new Date(mon); d.setDate(mon.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function changeWeek(offset) {
            state.currentWeekOffset += offset;
            document.getElementById('week-display').innerText = state.currentWeekOffset === 0 ? '本週' : `第 ${state.currentWeekOffset} 週`;
            initCalendars();
            updateGroupVisuals(state.allResponses);
        }

        function showTooltip(e, sid) {
            const users = state.groupData[sid];
            if (!users) return;
            const tt = document.getElementById('tooltip');
            const list = document.getElementById('tooltip-names');
            list.innerHTML = `<div class="font-black border-b border-slate-700 mb-2 pb-1 text-emerald-400">可出席 (${users.length})</div>`;
            users.forEach(u => {
                const s = document.createElement('div');
                s.className = "flex justify-between gap-4";
                s.innerHTML = `<span>${u.name}</span><span class="opacity-40 text-[8px]">${u.diet}</span>`;
                list.appendChild(s);
            });
            tt.classList.remove('hidden');
            tt.style.left = e.pageX + 'px'; tt.style.top = e.pageY + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').classList.add('hidden'); }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            if (!title) return showToast("標題不能為空");
            
            const btn = document.getElementById('create-btn');
            btn.innerText = "生成中...";
            const res = await callAPI({ action: 'createMeeting', title, description: desc, hasMeal: document.getElementById('new-meal-toggle').checked });
            
            if (res.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                document.getElementById('link-result').classList.remove('hidden');
                document.getElementById('go-to-link').onclick = () => window.location.href = url;
            }
            btn.innerText = "生成邀請連結";
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(url).then(() => showToast("已複製連結"));
        }

        window.onmouseup = () => state.isDragging = false;
    </script>
</body>
</html>
