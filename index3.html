<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingSync V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; } /* 禁止全頁滾動 */
        .calendar-grid { display: grid; grid-template-columns: 45px repeat(7, 1fr); }
        .slot { height: 28px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; position: relative; transition: all 0.1s; }
        .slot-active { background-color: #3b82f6 !important; }
        .slot-hover:hover { background-color: #eff6ff; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .diet-btn { transition: all 0.2s ease; border-width: 2px; }
        .diet-btn.active-meat { background-color: #ef4444; color: white; border-color: #ef4444; }
        .diet-btn.active-veg { background-color: #10b981; color: white; border-color: #10b981; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col">

    <!-- 訊息提示 -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-4 py-2 rounded-xl bg-slate-900 text-white text-xs font-bold shadow-2xl opacity-0 pointer-events-none transition-all">
        <span id="toast-msg"></span>
    </div>

    <!-- 導航欄 (高度壓縮) -->
    <nav class="bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center shrink-0">
        <h1 class="text-lg font-black text-blue-600 flex items-center gap-1 cursor-pointer" onclick="window.location.reload()">
            <i data-lucide="calendar-range" class="w-5 h-5"></i> MeetingSync
        </h1>
        <div id="nav-user-info" class="hidden flex items-center gap-2">
            <span id="display-user-name" class="text-[10px] font-black bg-slate-100 px-3 py-1 rounded-full border border-slate-200"></span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-h-0">
        <!-- 建立會議 & 登入視圖 (保持居中) -->
        <div id="view-admin" class="m-auto max-w-sm w-full bg-white rounded-2xl shadow-lg p-6 border border-slate-200 hidden">
            <h2 class="text-xl font-black mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="text-blue-500"></i> 發起會議</h2>
            <div class="space-y-3">
                <input id="new-title" type="text" placeholder="會議主題" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="new-desc" placeholder="簡短說明" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50 h-20 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div class="flex items-center justify-between p-3 bg-orange-50 rounded-xl border border-orange-100">
                    <span class="text-xs font-bold text-orange-700">統計餐點需求</span>
                    <input type="checkbox" id="new-meal-toggle" class="w-4 h-4" checked>
                </div>
                <button onclick="handleCreateMeeting()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-sm hover:bg-slate-800 transition-all">生成連結</button>
                <div id="link-result" class="hidden space-y-2 mt-4">
                    <div class="bg-green-50 p-2 rounded-lg border border-green-100 flex items-center gap-2">
                        <code id="generated-url" class="text-[10px] truncate flex-1 text-green-700"></code>
                        <button onclick="copyLink()" class="p-1 hover:bg-white rounded"><i data-lucide="copy" class="w-3 h-3"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-auth" class="m-auto max-w-xs w-full bg-white rounded-2xl shadow-lg p-6 border border-slate-200 hidden text-center">
            <h2 id="auth-meeting-title" class="text-lg font-black mb-4 text-slate-800">載入中...</h2>
            <div class="space-y-3">
                <input id="login-name" type="text" placeholder="您的姓名" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <input id="login-password" type="password" placeholder="個人密碼" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-sm hover:bg-blue-700">進入系統</button>
            </div>
        </div>

        <!-- 調查主視圖 (緊湊版) -->
        <div id="view-survey" class="flex-1 flex flex-col min-h-0 hidden px-4 py-2 gap-2">
            <!-- 標題與切換週次 -->
            <div class="flex justify-between items-center shrink-0">
                <div>
                    <h2 id="survey-title" class="text-lg font-black leading-tight"></h2>
                    <p id="survey-desc" class="text-[10px] text-slate-400 truncate max-w-[300px]"></p>
                </div>
                <div class="flex items-center gap-1 bg-white border border-slate-200 p-1 rounded-xl">
                    <button onclick="changeWeek(-1)" class="p-1 hover:bg-slate-100 rounded-lg"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="week-display" class="text-[10px] font-black px-2 w-20 text-center">本週</span>
                    <button onclick="changeWeek(1)" class="p-1 hover:bg-slate-100 rounded-lg"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
            </div>

            <!-- 日曆區域 -->
            <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 min-h-0">
                <!-- 個人 -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="px-3 py-1.5 bg-blue-600 text-white text-[10px] font-black flex items-center gap-1 shrink-0">
                        <i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> 點擊/拖曳標記您的空檔
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll" id="scroll-sync-1">
                        <div id="my-calendar" class="calendar-grid no-select" oncontextmenu="return false;"></div>
                    </div>
                </div>
                <!-- 團隊 -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="px-3 py-1.5 bg-slate-800 text-white text-[10px] font-black flex items-center gap-1 shrink-0">
                        <i data-lucide="users" class="w-3 h-3"></i> 團隊空檔統計
                    </div>
                    <div class="flex-1 overflow-auto custom-scroll" id="scroll-sync-2">
                        <div id="team-calendar" class="calendar-grid no-select"></div>
                    </div>
                </div>
            </div>

            <!-- 底部功能區 (不再浮動，固定在底部) -->
            <div class="bg-white border border-slate-200 rounded-2xl p-3 shadow-md flex items-center gap-4 shrink-0">
                <div id="meal-survey-section" class="flex-1 flex items-center gap-2 hidden">
                    <span class="text-[11px] font-black text-slate-500 shrink-0">飲食：</span>
                    <div id="diet-container" class="grid grid-cols-2 gap-2 flex-1 border border-transparent rounded-lg p-0.5">
                        <button id="btn-meat" onclick="setDiet('葷食')" class="diet-btn py-1.5 rounded-lg border-slate-100 bg-slate-50 text-[11px] font-black">葷食</button>
                        <button id="btn-veg" onclick="setDiet('素食')" class="diet-btn py-1.5 rounded-lg border-slate-100 bg-slate-50 text-[11px] font-black">素食</button>
                    </div>
                </div>
                <button onclick="handleFinalSave()" id="save-btn" class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-black text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-4 h-4"></i> 儲存送出
                </button>
            </div>
        </div>
    </main>

    <!-- 提示框 -->
    <div id="tooltip" class="fixed z-[9999] pointer-events-none bg-slate-900 text-white px-3 py-2 rounded-xl text-[10px] shadow-2xl border border-slate-700 hidden">
        <div id="tooltip-names" class="flex flex-wrap gap-1 max-w-[150px]"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxogvFVUYKbBaHqzXWFO714dhcEmjgt1r9IkwUeNtUxwYlW4eYs0IrQEVdLp7zBb_yn/exec';
        const meetingId = new URLSearchParams(window.location.search).get('id');
        
        let state = {
            userName: '', password: '', diet: null,
            mySlots: {}, groupData: {}, meetingInfo: null,
            totalParticipants: 0, isDragging: false, dragMode: true, currentWeekOffset: 0
        };

        const hours = Array.from({ length: 15 }, (_, i) => i + 8); 
        const daysShort = ['一', '二', '三', '四', '五', '六', '日'];

        window.onload = async () => {
            lucide.createIcons();
            if (meetingId) {
                showView('view-auth');
                const res = await callAPI({ action: 'getMeetingInfo', meetingId });
                state.meetingInfo = res;
                if (!res || res.error) {
                    document.getElementById('auth-meeting-title').innerText = "查無會議";
                    return;
                }
                document.getElementById('auth-meeting-title').innerText = res.title;
            } else {
                showView('view-admin');
            }
        };

        async function callAPI(data) {
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                return await response.json();
            } catch (e) {
                showToast("連線失敗");
                return { error: "error" };
            }
        }

        function showView(id) {
            ['view-admin', 'view-auth', 'view-survey'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'view-survey') {
                document.getElementById('nav-user-info').classList.remove('hidden');
                if (state.meetingInfo?.hasMeal) document.getElementById('meal-survey-section').classList.remove('hidden');
            }
        }

        function setDiet(type) {
            state.diet = type;
            document.getElementById('diet-container').classList.remove('error-shake');
            const bMeat = document.getElementById('btn-meat');
            const bVeg = document.getElementById('btn-veg');
            bMeat.className = 'diet-btn py-1.5 rounded-lg border-slate-100 bg-slate-50 text-[11px] font-black';
            bVeg.className = 'diet-btn py-1.5 rounded-lg border-slate-100 bg-slate-50 text-[11px] font-black';
            if (type === '葷食') bMeat.classList.add('active-meat');
            else bVeg.classList.add('active-veg');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        async function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            if (!name || !pass) return showToast("請輸入姓名及密碼");
            
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerText = "驗證中...";

            const res = await callAPI({ action: 'getAllResponses', meetingId });
            if (res?.responses) {
                const mine = res.responses.find(r => String(r.name).trim() === name);
                if (mine && mine.password && String(mine.password) !== String(pass)) {
                    showToast("密碼錯誤");
                    btn.disabled = false;
                    btn.innerText = "進入系統";
                    return;
                }
                state.userName = name;
                state.password = pass;
                document.getElementById('display-user-name').innerText = name;
                if (mine) {
                    if (mine.diet && mine.diet !== '未調查') setDiet(mine.diet);
                    try { state.mySlots = JSON.parse(mine.slots || "{}"); } catch(e){}
                }
                initCalendars();
                updateGroupVisuals(res.responses);
                showView('view-survey');
                document.getElementById('survey-title').innerText = state.meetingInfo.title;
                document.getElementById('survey-desc').innerText = state.meetingInfo.description;
            }
            btn.disabled = false;
        }

        async function handleFinalSave() {
            if (state.meetingInfo?.hasMeal && !state.diet) {
                showToast("⚠️ 請選擇飲食需求");
                const container = document.getElementById('diet-container');
                container.classList.add('error-shake');
                setTimeout(() => container.classList.remove('error-shake'), 400);
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();

            const res = await callAPI({
                action: 'saveResponse', meetingId, name: state.userName, password: state.password,
                diet: state.diet || '未調查', slots: JSON.stringify(state.mySlots)
            });

            if (res.success) {
                showToast("✅ 已儲存");
                const refresh = await callAPI({ action: 'getAllResponses', meetingId });
                if (refresh.responses) updateGroupVisuals(refresh.responses);
            }
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> 儲存送出`;
            lucide.createIcons();
        }

        function initCalendars() {
            renderGrid('my-calendar', true);
            renderGrid('team-calendar', false);
        }

        function renderGrid(containerId, isInteractive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const dates = getWeekDates();
            
            // Header
            container.appendChild(createCell('', 'slot bg-slate-50 border-b border-r'));
            dates.forEach((date, i) => {
                const cell = createCell('', 'slot bg-slate-50 border-b border-r flex flex-col items-center justify-center');
                cell.innerHTML = `<span class="text-[8px] text-slate-400 font-bold">${daysShort[i]}</span><span class="text-[9px] font-black">${date.split('-')[2]}</span>`;
                container.appendChild(cell);
            });

            // Rows
            hours.forEach(hour => {
                container.appendChild(createCell(hour, 'slot text-[9px] text-slate-400 font-bold flex items-center justify-center bg-slate-50'));
                dates.forEach(date => {
                    const sid = `${date}_${hour}`;
                    const cell = createCell('', `slot ${isInteractive ? 'slot-hover cursor-pointer' : ''}`);
                    cell.id = `${containerId}-${sid}`;
                    if (isInteractive) {
                        if (state.mySlots[sid]) cell.classList.add('slot-active');
                        cell.onmousedown = () => { state.isDragging = true; state.dragMode = !cell.classList.contains('slot-active'); toggleSlot(sid, cell); };
                        cell.onmouseenter = () => { if (state.isDragging) toggleSlot(sid, cell); };
                    } else {
                        cell.onmouseenter = (e) => showTooltip(e, sid);
                        cell.onmouseleave = hideTooltip;
                    }
                    container.appendChild(cell);
                });
            });
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            return div;
        }

        function toggleSlot(id, el) {
            if (state.dragMode) { state.mySlots[id] = true; el.classList.add('slot-active'); }
            else { delete state.mySlots[id]; el.classList.remove('slot-active'); }
        }

        function updateGroupVisuals(responses) {
            state.groupData = {};
            state.totalParticipants = responses.length;
            responses.forEach(r => {
                const s = JSON.parse(r.slots || "{}");
                Object.keys(s).forEach(sid => {
                    if (!state.groupData[sid]) state.groupData[sid] = [];
                    state.groupData[sid].push({ name: r.name, diet: r.diet });
                });
            });
            const dates = getWeekDates();
            hours.forEach(h => {
                dates.forEach(d => {
                    const sid = `${d}_${h}`;
                    const cell = document.getElementById(`team-calendar-${sid}`);
                    if (!cell) return;
                    const count = state.groupData[sid]?.length || 0;
                    const ratio = state.totalParticipants > 0 ? count / state.totalParticipants : 0;
                    cell.style.backgroundColor = count > 0 ? `rgba(59, 130, 246, ${0.15 + ratio * 0.85})` : '';
                    cell.innerHTML = count > 0 ? `<span class="absolute inset-0 flex items-center justify-center text-[9px] font-black ${ratio > 0.5 ? 'text-white' : 'text-blue-600'}">${count}</span>` : '';
                });
            });
        }

        function getWeekDates() {
            const dates = [];
            const today = new Date();
            const diff = today.getDay() === 0 ? -6 : 1 - today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() + diff + (state.currentWeekOffset * 7));
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function changeWeek(offset) {
            state.currentWeekOffset += offset;
            document.getElementById('week-display').innerText = state.currentWeekOffset === 0 ? '本週' : (state.currentWeekOffset > 0 ? `下 ${state.currentWeekOffset} 週` : `前 ${Math.abs(state.currentWeekOffset)} 週`);
            initCalendars();
            if (state.totalParticipants > 0) handleLogin();
        }

        function showTooltip(e, sid) {
            const users = state.groupData[sid];
            if (!users) return;
            const tt = document.getElementById('tooltip');
            const list = document.getElementById('tooltip-names');
            list.innerHTML = `<div class="w-full font-black border-b border-slate-700 mb-1">${users.length} 人</div>`;
            users.forEach(u => {
                const s = document.createElement('span');
                s.className = `px-1.5 py-0.5 rounded ${u.diet === '素食' ? 'bg-green-600' : 'bg-slate-700'}`;
                s.innerText = u.name + (u.diet === '素食' ? ' (素)' : '');
                list.appendChild(s);
            });
            tt.classList.remove('hidden');
            tt.style.left = (e.pageX + 10) + 'px'; tt.style.top = (e.pageY + 10) + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').classList.add('hidden'); }

        async function handleCreateMeeting() {
            const title = document.getElementById('new-title').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            const hasMeal = document.getElementById('new-meal-toggle').checked;
            if (!title) return showToast("請輸入主題");
            const res = await callAPI({ action: 'createMeeting', title, description: desc, hasMeal });
            if (res?.meetingId) {
                const url = window.location.origin + window.location.pathname + '?id=' + res.meetingId;
                document.getElementById('generated-url').innerText = url;
                document.getElementById('link-result').classList.remove('hidden');
                lucide.createIcons();
            }
        }

        function copyLink() {
            const url = document.getElementById('generated-url').innerText;
            const el = document.createElement('textarea');
            el.value = url; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            showToast("複製成功");
        }

        window.onmouseup = () => state.isDragging = false;
    </script>
</body>
</html>
